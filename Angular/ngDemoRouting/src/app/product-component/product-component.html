<h1>Product List</h1>
<div>
    <table>
        <thead>
            <tr>
                <th>Product ID</th>
                <th>Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products">
                <td>{{ product.productID }}</td>
                <td><a [routerLink]="['detail', product.productID]">{{ product.name }}</a></td>
                <td>{{ product.price | currency }}</td>
            </tr>
    </table>
</div>
<hr/>
<router-outlet></router-outlet>
