<h2>
    User Management
</h2>

<form (ngSubmit)="saveUser()">
    <div>
        <label for="name">Name:</label>
        <input type="text" id="name" [(ngModel)]="selectedUser.name" name="name" required>
    </div>
    <div>
        <label for="email">Email:</label>
        <input type="email" id="email" [(ngModel)]="selectedUser.email" name="email" required>
    </div>
    <button type="submit">{{ isEditMode ? 'Update' : 'Add' }} User</button>
    <button type="button" (click)="resetForm()" >Clear Form</button>
</form>
<hr/>

<table border = "1" width="50%">
    <thead>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let user of users">
            <td>{{ user.name }}</td>
            <td>{{ user.email }}</td>
            <td>
                <button (click)="editUser(user)">Edit</button>
                <button (click)="deleteUser(user.id)">Delete</button>
            </td>
        </tr>
    </tbody>
