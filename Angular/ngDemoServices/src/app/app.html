<div>
  <h1>
    <strong>Services</strong>Demo
  </h1>

  <button type="button" (click)="getProducts()">Get Products</button>

  <div>
    <table>
      <thead>
        <tr>
          <th>Product ID</th>
          <th>Name</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let product of products;">
          <td>
            {{product.productID}}
          </td>
          <td>
            {{product.name}}
          </td>
          <td>
            {{product.price}}
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<router-outlet></router-outlet>
